<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pinterest OAuth Callback</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 2rem; }
    .box { background: #222; border: 1px solid #444; padding: 1.5rem; border-radius: 6px; max-width: 700px; }
    .code { background: #000; color: #0f0; padding: 1rem; border-radius: 4px; word-break: break-all; font-size: 0.9rem; margin: 1rem 0; }
    .label { color: #888; font-size: 0.8rem; margin-bottom: 0.25rem; }
    button { background: #c00; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-family: monospace; }
  </style>
</head>
<body>
  <div class="box">
    <div class="label">PINTEREST OAUTH — AUTH CODE</div>
    <div class="code" id="code-display">Reading...</div>
    <button onclick="copyCode()">Copy Code</button>
    <div style="margin-top:1rem; color:#888; font-size:0.8rem;">Paste this code to Hephaestus to complete token exchange.</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const el = document.getElementById('code-display');

    if (code) {
      el.textContent = code;
    } else if (error) {
      el.style.color = '#f66';
      el.textContent = 'Error: ' + error + ' — ' + (params.get('error_description') || '');
    } else {
      el.style.color = '#f66';
      el.textContent = 'No code found in URL.';
    }

    function copyCode() {
      navigator.clipboard.writeText(code || '').then(() => {
        document.querySelector('button').textContent = 'Copied!';
        setTimeout(() => document.querySelector('button').textContent = 'Copy Code', 2000);
      });
    }
  </script>
</body>
</html>
